site_name: DevOps Reference
site_description: A comprehensive knowledge base for DevOps engineers — operations, runbooks, and practical guides
site_url: https://devops-notes-b2c.pages.dev

theme:
  name: readthedocs
  locale: en
  logo: img/logo.webp
  favicon: img/favicon.webp

extra_css:
  - css/extra.css

extra_javascript:
  - js/extra.js

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
  - redirects:
      redirect_maps: {}
  - glightbox
  - section-index
  - table-reader
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
  - print-site

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.emoji
  - pymdownx.tasklist:
      custom_checkbox: true
  - footnotes

nav:
  - Home: index.md
  - Server Setup & Provisioning:
      - Server Provisioning: guides/server-provisioning.md
      - Patch Management: sops/patch-management.md
      - Server Migration: sops/migration.md
      - Swap Configuration: guides/swap-configuration.md
      - File Permissions Cheat Sheet: guides/file-permissions.md
  - Web Server & Performance:
      - Nginx Performance Tuning: guides/nginx-performance.md
      - PHP Tuning: guides/php-tuning.md
      - Cloudflare Cache Tuning: guides/cloudflare-cache.md
      - Log Management: guides/log-management.md
      - SSL Troubleshooting: guides/ssl-troubleshooting.md
      - DNS Management: sops/dns-management.md
  - Installation Guides:
      - Install Certbot & SSL: guides/install-certbot.md
      - Install Docker & Compose: guides/install-docker.md
      - Install CloudPanel: guides/install-cloudpanel.md
      - Install aaPanel: guides/install-aapanel.md
      - Jenkins Installation: guides/jenkins-installation.md
      - Node.js Installation: guides/nodejs-installation.md
  - Database:
